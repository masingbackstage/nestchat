name: CI and Deploy

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: nestchat_test
          POSTGRES_USER: nestchat
          POSTGRES_PASSWORD: nestchat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nestchat -d nestchat_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgres://nestchat:nestchat@127.0.0.1:5432/nestchat_test
      REDIS_URL: redis://127.0.0.1:6379/0
      CACHE_URL: redis://127.0.0.1:6379/1
      DJANGO_SECRET_KEY: github-actions-test-secret
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      CSRF_TRUSTED_ORIGINS: http://localhost:5173
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: pip install poetry
      - name: Install backend dependencies
        run: poetry install --no-interaction --no-ansi --no-root
      - name: Run backend system checks
        run: poetry run python manage.py check
      - name: Run backend smoke tests
        run: >-
          poetry run pytest -q
          src/apps/user/tests/test_registration_password_policy.py
          src/apps/chat/tests/test_auth_security.py::test_logout_all_blacklists_user_refresh_tokens

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Run frontend checks
        run: npm run check
      - name: Build frontend
        env:
          VITE_API_URL: https://api.nestchat.online/api
          VITE_WS_URL: wss://api.nestchat.online
        run: npm run build

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - backend
      - frontend
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          script: |
            set -eu
            APP_DIR="${{ secrets.DEPLOY_PATH }}"
            REPO_URL="git@github.com:masingbackstage/nestchat.git"

            if [ ! -d "$APP_DIR/.git" ]; then
              mkdir -p "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build
