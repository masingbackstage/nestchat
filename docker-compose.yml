services:
  db:
    image: postgres:15-alpine
    container_name: nestchat_db
    restart: always
    environment:
      POSTGRES_DB: nestchat_db
      POSTGRES_USER: nestchat_user
      POSTGRES_PASSWORD: supersecretpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: nestchat_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: nestchat_rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - rabbitmq_data:/var/lib/rabbitmq

  livekit:
    image: livekit/livekit-server:latest
    container_name: nestchat_livekit
    entrypoint:
      - /bin/sh
      - -ec
      - |
        printf 'keys:\n  %s: %s\nwebhook:\n  api_key: "%s"\n  urls:\n    - "%s"\n' \
          "$$LIVEKIT_API_KEY" "$$LIVEKIT_API_SECRET" "$$LIVEKIT_API_KEY" "$$LIVEKIT_WEBHOOK_URL" \
          >/tmp/livekit.yaml
        exec /livekit-server --dev --config /tmp/livekit.yaml
    restart: always
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    environment:
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: secret
      LIVEKIT_WEBHOOK_URL: http://backend:8000/api/servers/livekit/webhook/

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: nestchat_backend
    restart: always
    command: daphne -b 0.0.0.0 -p 8000 src.asgi:application
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/backend
    environment:
      - DATABASE_URL=postgres://nestchat_user:supersecretpassword@db:5432/nestchat_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - LIVEKIT_API_KEY=devkey
      - LIVEKIT_API_SECRET=secret
      - LIVEKIT_URL=ws://livekit:7880
      - LIVEKIT_PUBLIC_URL=ws://localhost:7880
      - LIVEKIT_WEBHOOK_SECRET=secret
    depends_on:
      - db
      - redis
      - rabbitmq

  celery:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: nestchat_celery
    restart: always
    command: celery -A src worker -l info
    volumes:
      - ./backend:/backend
    environment:
      - DATABASE_URL=postgres://nestchat_user:supersecretpassword@db:5432/nestchat_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
    depends_on:
      - backend
      - rabbitmq
      - db
volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
