services:
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_WS_URL: ${VITE_WS_URL}
    container_name: nestchat_caddy
    restart: unless-stopped
    env_file:
      - .env.prod
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - backend_static:/srv/backend-static:ro

  db:
    image: postgres:15-alpine
    container_name: nestchat_db_prod
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nestchat_redis_prod
    restart: unless-stopped
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: nestchat_rabbitmq_prod
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - rabbitmq_data_prod:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  livekit:
    image: livekit/livekit-server:latest
    container_name: nestchat_livekit_prod
    restart: unless-stopped
    command: --dev --bind 0.0.0.0
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
      args:
        ENV: production
    container_name: nestchat_backend_prod
    restart: unless-stopped
    user: "0:0"
    command: sh /backend/scripts/start-production.sh
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      CACHE_URL: redis://redis:6379/1
      CELERY_BROKER_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672//
      LIVEKIT_URL: ws://livekit:7880
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - backend_static:/backend/staticfiles

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
      args:
        ENV: production
    container_name: nestchat_celery_prod
    restart: unless-stopped
    command: celery -A src worker -l info
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      CACHE_URL: redis://redis:6379/1
      CELERY_BROKER_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672//
      LIVEKIT_URL: ws://livekit:7880
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  backend_static:
  caddy_config:
  caddy_data:
  postgres_data_prod:
  rabbitmq_data_prod:
  redis_data_prod:
